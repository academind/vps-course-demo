# Copy this file to /etc/ssh/sshd_config.d/99-hardening.conf (or similar)
#
# Before you reload SSH:
# 1) Keep your current SSH session open
# 2) Test login with your non-root user in a second terminal
# 3) Validate with: sudo sshd -t
# 4) Reload with:   sudo systemctl reload ssh

# --- Core authentication hardening ---
PermitRootLogin no
PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no

# --- Disable GUI forwarding on servers ---
X11Forwarding no
AllowUsers <your-user>
